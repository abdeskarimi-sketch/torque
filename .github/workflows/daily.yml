name: Update & Deploy Cycle Engine

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch latest metrics
        env:
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          ETF_API_URL: ${{ secrets.ETF_API_URL }}
          ETF_API_KEY: ${{ secrets.ETF_API_KEY }}
        run: node scripts/fetch-data.mjs
      - name: Commit refreshed data.json
        run: |
          git config user.name  "cycle-bot"
          git config user.email "cycle-bot@users.noreply.github.com"
          git add data.json
          git commit -m "data: $(date -u +%FT%TZ) [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
